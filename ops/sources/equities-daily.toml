# Forward-poll for `yahoo/equities_daily/v1` over the Soothsayer
# universe. Daily fire at 22:00 UTC, after the US-equities close
# (20:00 UTC EDT / 21:00 UTC EST), gives Stooq's EOD CSV ~1-2h to
# publish today's bar so Tuesday-morning Soothsayer cron consumers
# see Monday's `open` value reliably.
#
# Why daily, not weekday-only: Stooq is a no-op on weekends (no new
# bar), but a daily fire keeps `workflow_run.v2` cadence regular and
# the [freshness] SLA below stays uniform — easier to reason about.
# Re-pulls dedup cleanly on `(symbol, ts)` per the yahoo.v1 schema.
#
# Why post-close, not 14:30 UTC: the source (Stooq daily CSV) only
# republishes after the US session closes. A 14:30 UTC fire would
# only ever capture the prior trading day's bar, leaving Monday's
# bar absent until Tuesday. 22:00 UTC captures the same-day close.
#
# Symbol set: the 10-symbol Soothsayer xStock/RWA universe (SPY,
# QQQ, AAPL, GOOGL, NVDA, TSLA, HOOD, GLD, TLT, MSTR) plus
# `BTC-USD` (load-bearing for MSTR's post-2020-08 BTC factor pivot).
#
# Symbols intentionally NOT in the set despite the M6 brief asking
# for them, because Stooq's free-tier CSV endpoint does not serve
# them (verified 2026-05-04 — Stooq returns either `No data` or
# zero rows on the auth'd request):
#   - `ES=F`, `NQ=F`, `GC=F`, `ZN=F` (CME factor-futures daily
#     bars). Note: `cme/intraday_1m/v1` IS shipped and forward-
#     polled for the same 4 symbols at 1m resolution, so consumers
#     can resample to daily without needing a daily venue here.
#   - `^VIX`, `^GVZ`, `^MOVE` (CBOE / ICE volatility indices). VIX
#     daily is in the wishlist as a future fetcher (cboe_indices.v1
#     historical work landed phase 47); a forward-poll manifest is
#     not yet shipped.
# The legacy yfinance import (mtime 2026-04-29) populated the
# historical surfaces for these 5 symbols on disk, so partitions
# exist but stay frozen until a sibling fetcher is added. Soothsayer
# panel.py reads these consumer-side; document upstream as data-
# pending in `wishlist.md` ("M6 G1.b — futures/^VIX daily forward
# poll") so the gap is tracked rather than silent.

id = "equities-daily"
description = "Daily Stooq EOD OHLCV poll for the Soothsayer 10-symbol universe + BTC-USD (11 total). Forward-only; lookback=7d for cheap dedup-safe re-pulls. Futures + ^VIX intentionally excluded — Stooq does not serve them; tracked separately in wishlist."
schema_ids = ["yahoo.v1"]

[fetch]
command = "scry"
args = [
    "equities", "bars",
    "--symbols", "SPY,QQQ,AAPL,GOOGL,NVDA,TSLA,HOOD,GLD,TLT,MSTR,BTC-USD",
    "--lookback-days", "7",
    "--source", "stooq:csv:runner",
]

[criticality]
tier = "tier-1"
owner = "@adam"
consumer_impact = "Daily underlier OHLCV for the Soothsayer Paper-1/Paper-3 analyses + BTC-USD for MSTR's post-2020-08 factor pivot. Stale = research blocked: Tuesday-morning forward-coverage cron cannot read Monday's open."

[freshness]
# 25h ceiling: a successful daily fire should land within 24h of the
# prior fire, plus a 1h grace window for clock skew / Stooq publish
# lag. Mirrors the analytics-workflow-runs SLA shape.
sla_secs = 90000

[budget]
# 11 symbols × 1 Stooq request each × ~500ms rate-limit gap = ~7s
# wall-clock per fire; cap loosely above observed.
max_requests_per_run = 30

[workflow]
sensor = "daily(22:00Z)"
