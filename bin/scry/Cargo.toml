[package]
name = "scry-bin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "scry CLI: fetch + import + manage. Frontend over scryer-fetch-* + scryer-store."

[[bin]]
name = "scry"
path = "src/main.rs"

[dependencies]
scryer-schema = { path = "../../crates/scryer-schema" }
scryer-store = { path = "../../crates/scryer-store" }
scryer-fetch-solana = { path = "../../crates/scryer-fetch-solana" }
clap = { version = "4", features = ["derive", "env"] }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
dotenvy = "0.15"
serde = { workspace = true }
serde_json = { workspace = true }
