[package]
name = "scry-bin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "scry CLI: fetch + import + manage. Frontend over scryer-fetch-* + scryer-store."

[[bin]]
name = "scry"
path = "src/main.rs"

[dependencies]
scryer-schema = { path = "../../crates/scryer-schema" }
scryer-store = { path = "../../crates/scryer-store" }
scryer-fetch-solana = { path = "../../crates/scryer-fetch-solana" }
scryer-fetch-redstone = { path = "../../crates/scryer-fetch-redstone" }
scryer-fetch-pyth = { path = "../../crates/scryer-fetch-pyth" }
scryer-fetch-dexagg = { path = "../../crates/scryer-fetch-dexagg" }
scryer-fetch-jito = { path = "../../crates/scryer-fetch-jito" }
scryer-fetch-equities = { path = "../../crates/scryer-fetch-equities" }
scryer-fetch-rss = { path = "../../crates/scryer-fetch-rss" }
scryer-fetch-fred = { path = "../../crates/scryer-fetch-fred" }
clap = { version = "4", features = ["derive", "env"] }
tokio = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }
anyhow = "1"
chrono = { version = "0.4", default-features = false, features = ["clock"] }
dotenvy = "0.15"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { workspace = true }
serde_json = { workspace = true }
