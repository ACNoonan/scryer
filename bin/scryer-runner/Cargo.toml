[package]
name = "scryer-runner-bin"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "scryer-runner CLI: tick / check / once / dry-run subcommands over the manifest-driven workflow runner."

[[bin]]
name = "scryer-runner"
path = "src/main.rs"

[dependencies]
scryer-runner = { path = "../../crates/scryer-runner" }
scryer-sensors = { path = "../../crates/scryer-sensors" }
clap = { version = "4", features = ["derive"] }
anyhow = "1"
tracing = { workspace = true }
tracing-subscriber = { version = "0.3", features = ["env-filter", "fmt"] }

[lints]
workspace = true
